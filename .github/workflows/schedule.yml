name: DouYin Spark Flow

on:
  schedule:
    - cron: '30 0 * * *'      # 每天北京时间早上 8:30 左右运行（可自行修改）
  workflow_dispatch:          # 允许手动触发测试

jobs:
  spark-flow:
    runs-on: ubuntu-latest
    environment: user-data     # 必须保留，用于读取 USER_DATA secret

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5     # ← 关键升级：从 v4 改成 v5
        with:
          python-version: '3.12'          # 推荐使用 3.12，稳定且兼容好

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run DouYin SparkFlow
        env:
          USER_DATA: ${{ secrets.USER_DATA }}
        run: python main.py
